<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 280px; padding: 16px; font-family: system-ui; font-size: 13px; }
  h3 { margin: 0 0 12px; font-size: 14px; }
  button { width: 100%; padding: 10px; border: none; border-radius: 6px; background: #6c5ce7; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  button:hover:not(:disabled) { background: #5a4bd1; }
  #status { margin-top: 10px; font-size: 12px; color: #666; }
  #status.ok { color: #27ae60; }
  #status.err { color: #e74c3c; }
</style>
</head>
<body>
  <h3>LeoStudio</h3>
  <button id="btn">Export Cookies</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
