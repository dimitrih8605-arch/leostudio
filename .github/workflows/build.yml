# Cross-platform release builds for LeoStudio desktop.
# Triggered on tag push (v*.*.*) or manual dispatch from the Actions UI.
# Each OS runs `wails build` natively; cross-compilation isn't supported by
# Wails, so we use a matrix of host runners.
name: build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            wails-tags: "webkit2_41"
            artifact: leostudio-linux-amd64
            built: build/bin/leostudio-desktop
          - platform: windows
            os: windows-latest
            wails-tags: ""
            artifact: leostudio-windows-amd64.exe
            built: build/bin/leostudio-desktop.exe
          - platform: macos
            os: macos-latest
            wails-tags: ""
            artifact: leostudio-macos.zip
            built: build/bin/leostudio-desktop.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Linux dev libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (${{ matrix.platform }})
        working-directory: desktop
        env:
          WAILS_TAGS: ${{ matrix.wails-tags }}
        run: |
          if [ -n "$WAILS_TAGS" ]; then
            wails build -tags "$WAILS_TAGS" -ldflags "-w -s"
          else
            wails build -ldflags "-w -s"
          fi
        shell: bash

      - name: Package macOS app
        if: runner.os == 'macOS'
        working-directory: desktop/build/bin
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            leostudio-desktop.app ../../../${{ matrix.artifact }}

      - name: Rename Linux/Windows artifact
        if: runner.os != 'macOS'
        working-directory: desktop
        shell: bash
        run: cp "${{ matrix.built }}" "../${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
